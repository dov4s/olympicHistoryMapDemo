<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympic Medals Globe</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>

    <div class="app-container">
        <div class="globe-container">
            <canvas id="globe-canvas"></canvas>

            <div id="markers-container"></div>
            
            <div id="current-olympic-title" class="current-olympic-title"></div>
            <div class="controls-container">
                <button id="btn-dummy-prev" class="control-btn dummy-btn hidden"></button>
                <button id="btn-prev" class="control-btn hidden"></button>
                <button id="btn-next" class="control-btn hidden"></button>
                <button id="btn-dummy-next" class="control-btn dummy-btn hidden"></button>
            </div>
            <div id="chart-container" class="dashboard-overlay hidden">
                
                <!-- ОБЩИЙ ЗАГОЛОВОК ДАШБОРДА -->
                <div class="dashboard-header">
                    <div class="main-title">
                        Участники и медалисты: 
                        <span class="color-world">весь мир</span> и 
                        <span id="main-title-rus" class="color-rus">Россия</span>
                    </div>
                    <div class="main-subtitle">Сколько спортсменов приехало на Игры и сколько из них уехало с медалями</div>
                </div>

                <!-- Блок для всего мира -->
                <div class="chart-block" id="world-chart-block">
                    <!-- Маленький заголовок секции -->
                    <div class="section-label color-world">Весь мир</div>
                    <svg id="chart-world"></svg>
                </div>

                <!-- Блок для России/СССР/ОКР -->
                <div class="chart-block" id="rus-chart-block">
                    <!-- Маленький заголовок секции (меняется в JS) -->
                    <div class="section-label color-rus" id="rus-section-title">Россия</div>
                    <svg id="chart-rus"></svg>
                </div>

            </div>
            <div id="articles-container" class="articles-overlay hidden">
                <div class="dashboard-header">
                    <div class="main-title">Контекст эпохи</div>
                </div>
                
                <!-- Сюда JS будет вставлять карточки статей -->
                <div id="articles-content"></div>
            </div>
        </div>

        <div id="tooltip" class="tooltip hidden">
            <h3 id="tt-country" class="tt-title">Страна</h3>
            <div class="tt-medals">
                <p class="medal-row"><span class="medal-icon">🥇</span> <span class="medal-label">Золото:</span> <span id="tt-gold" class="medal-value">0</span></p>
                <p class="medal-row"><span class="medal-icon">🥈</span> <span class="medal-label">Серебро:</span> <span id="tt-silver" class="medal-value">0</span></p>
                <p class="medal-row"><span class="medal-icon">🥉</span> <span class="medal-label">Бронза:</span> <span id="tt-bronze" class="medal-value">0</span></p>
                <hr>
                <p class="medal-row total-row"><span class="medal-label">Всего:</span> <span id="tt-total" class="medal-value">0</span></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
